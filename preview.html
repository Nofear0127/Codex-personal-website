<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CODEX / Two Worlds</title><style>
*{box-sizing:border-box}body{margin:0;background:#040711;color:#eaf6ff;font-family:Arial,Helvetica,sans-serif}.x{min-height:100svh;overflow:hidden;position:relative;isolation:isolate}.scene{position:absolute;inset:0;z-index:-3;background-size:cover;background-position:center;transition:transform .7s,filter .7s}.room .scene{background-image:linear-gradient(90deg,rgba(2,7,19,.84),rgba(2,7,19,.25),transparent),url('/public/assets/codex-room.png')}.warp .scene{background-image:linear-gradient(90deg,rgba(2,7,19,.76),rgba(2,7,19,.05)),url('/public/assets/codex-warp.png')}.noise{position:absolute;inset:0;opacity:.13;z-index:-1;background-image:radial-gradient(#fff .5px,transparent .7px);background-size:5px 5px}.top{height:86px;padding:0 5vw;border-bottom:1px solid #9fe5ff35;display:flex;align-items:center;justify-content:space-between;letter-spacing:.12em;font-size:10px}.brand{font-size:15px;font-weight:bold}.brand b{color:#64d9ff;font-size:22px}.versions{display:flex;border:1px solid #9fe5ff45;border-radius:99px;overflow:hidden;background:#08112499}.versions button,.nav button,.go{border:0;cursor:pointer}.versions button{background:none;color:#a9bfd1;padding:9px 13px;font-size:9px;letter-spacing:.1em}.versions .on{color:#03101b;background:#c6f1ff;font-weight:bold}.online{color:#a7bacd}.online i{display:inline-block;width:6px;height:6px;border-radius:50%;background:#61ffad;box-shadow:0 0 12px #61ffad;margin-right:7px}.nav{position:absolute;left:5vw;top:40%;display:grid;gap:16px}.nav button{padding:0;background:none;color:#a5b6c9;text-align:left;display:grid;grid-template-columns:28px 45px auto;align-items:center;gap:7px;font-size:10px;letter-spacing:.1em}.nav i{height:1px;background:#7790a7}.nav button.on{color:#fff}.nav button.on i{background:#63d9ff;box-shadow:0 0 10px #63d9ff}.hero{width:min(680px,62vw);margin-left:19vw;padding-top:clamp(125px,19vh,220px);animation:reveal .65s both}.tag{color:#65d8ff;font:11px monospace;letter-spacing:.15em}.hero h1{font-size:clamp(46px,5.5vw,85px);line-height:.96;letter-spacing:-.075em;margin:18px 0;color:#fff}.hero p{font-size:14px;color:#cad9e7;line-height:1.7;max-width:440px}.go{background:#aceeff;color:#031521;margin-top:12px;padding:13px 18px;font-weight:bold;letter-spacing:.12em;font-size:10px}.card{position:absolute;right:5vw;bottom:94px;width:180px;border-top:1px solid #9fe5ff45;padding-top:15px;font:10px monospace;letter-spacing:.12em}.card small{color:#8da5ba;display:block}.bar{height:2px;background:#ffffff30;margin-top:14px}.bar i{display:block;height:2px;background:#62d9ff;box-shadow:0 0 8px #62d9ff;transition:width .4s}.foot{position:absolute;left:5vw;right:5vw;bottom:25px;display:flex;justify-content:space-between;color:#90a8bb;font:8px monospace;letter-spacing:.14em}.orbit{position:absolute;left:52%;top:48%;width:380px;aspect-ratio:1;border:1px solid #63d9ff55;border-radius:50%;transform:rotateX(70deg);box-shadow:0 0 40px #268eff33}.portal{position:absolute;right:8vw;top:50%;width:min(48vw,700px);aspect-ratio:1;border:1px solid #d7f4ff75;border-radius:50%;transform:translateY(-50%);box-shadow:0 0 90px 25px #269fff45,inset 0 0 80px #298eff42}.travel .scene{transform:scale(1.25) rotate(2deg);filter:brightness(1.35) saturate(1.3) blur(1px)}.travel .portal{animation:p .52s}.travel .orbit{animation:o .52s}@keyframes reveal{from{opacity:0;transform:translateY(20px);filter:blur(6px)}to{opacity:1;transform:none;filter:none}}@keyframes p{50%{transform:translateY(-50%) scale(1.5) rotate(35deg);box-shadow:0 0 150px 45px #c7f6ff99}}@keyframes o{50%{transform:rotateX(70deg) rotate(180deg) scale(1.35)}}@media(max-width:700px){.top{height:70px;padding:0 20px}.online,.card{display:none}.versions button{padding:8px;font-size:8px}.nav{left:20px;top:auto;bottom:80px;gap:9px}.nav button{grid-template-columns:20px 28px auto;font-size:8px}.hero{width:calc(100% - 40px);margin-left:20px;padding-top:110px}.hero h1{font-size:52px}.foot{left:20px;right:20px;bottom:18px;font-size:7px}.portal{width:86vw;right:-30vw;opacity:.55}}
</style></head><body><main class="x room" id="app"><div class="scene"></div><div class="noise"></div><div class="orbit" id="shape"></div><header class="top"><div class="brand"><b>C/</b> CODEX<span style="color:#8094aa">.SPACE</span></div><div class="versions"><button class="on" onclick="version('room',this)">01 / STUDIO</button><button onclick="version('warp',this)">02 / COSMOS</button></div><div class="online"><i></i>ONLINE · 2026</div></header><nav class="nav" id="nav"></nav><section class="hero" id="hero"></section><div class="card"><small>NOW VIEWING</small><b id="now"></b><div class="bar"><i id="bar"></i></div></div><footer class="foot"><span id="system">CHAIR-ORBIT NAVIGATION</span><span>SELECT A SIGNAL</span></footer></main><script>
const data={room:[['控制台','把想法写成|可以运行的世界。','个人开发者 · AI 产品设计师 · 视觉实验者'],['AI 项目','AI projects,|made human.','生成式体验、智能工作流与 AI 产品界面：让模型能力成为可用的体验。'],['AI 档案','Building with|intelligence.','AI 产品设计 · 创意编程 · 提示词系统 · 自动化工作流。这里放进你的真实经历与成果。'],['信号站','Start a|new session.','有一个值得一起做的 AI 想法？发出你的信号。']],warp:[['原点宇宙','跨过光年，|抵达你的想象。','以宇宙航行般的速度，为品牌与产品创造下一站 AI 体验。'],['AI 探索','Worlds|I built.','生成式界面、AI 助手、智能工作流——每一个项目都是一颗有轨道的星球。'],['航行档案','A traveler|of AI worlds.','AI 产品设计 · 创意编程 · LLM 应用。这里可以替换为你的个人经历与代表作品。'],['发射信号','Open a|new portal.','下一次穿梭，也许就从一封邮件开始。']]};let mode='room',page=0;function render(){let d=data[mode][page];nav.innerHTML=data[mode].map((x,i)=>`<button class="${i===page?'on':''}" onclick="go(${i})"><span>0${i+1}</span><i></i><b>${x[0]}</b></button>`).join('');hero.innerHTML=`<div class="tag">${mode==='room'?'DEVELOPER STUDIO / 01':'INTERSTELLAR PORTFOLIO / 02'}</div><h1>${d[1].replace('|','<br>')}</h1><p>${d[2]}</p><button class="go" onclick="go((page+1)%4)">进入下一板块　↗</button>`;now.textContent=`0${page+1} / ${d[0]}`;bar.style.width=(page+1)*25+'%';system.textContent=mode==='room'?'CHAIR-ORBIT NAVIGATION':'LIGHTSPEED TRANSIT SYSTEM';shape.className=mode==='room'?'orbit':'portal'}function go(i){if(i===page)return;trans(()=>{page=i;render()})}function version(v,b){if(v===mode)return;trans(()=>{mode=v;page=0;document.querySelectorAll('.versions button').forEach(x=>x.classList.remove('on'));b.classList.add('on');app.className='x '+mode;render()})}function trans(done){app.classList.add('travel');setTimeout(()=>{done();app.classList.remove('travel')},520)}render();</script></body></html>
